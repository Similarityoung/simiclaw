name: repo-hygiene

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

concurrency:
  group: repo-hygiene
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: mkdir -p reports
      - name: Guardrails repo report
        run: make guardrails-report
        env:
          GUARDRAILS_REPORT: ${{ github.workspace }}/reports/guardrails.json
      - id: docs_links
        name: Strict docs links
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          format: markdown
          output: reports/docs-links.md
          args: >-
            --config .lychee.toml
            --verbose
            './*.md'
            './docs/**/*.md'
            './skills/**/*.md'
            './workspace/skills/**/*.md'
      - name: Update machine-managed docs
        run: |
          go run ./tools/hygiene-docs \
            --guardrails-report reports/guardrails.json \
            --links-status "${{ steps.docs_links.outcome }}" \
            --links-report reports/docs-links.md \
            --pr-body reports/pr-body.md
      - name: Upload hygiene artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repo-hygiene
          path: reports/
      - name: Create or update hygiene PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci/repo-hygiene
          title: chore: repo hygiene report
          commit-message: chore: update repo hygiene report
          body-path: reports/pr-body.md
          add-paths: |
            docs/QUALITY_SCORE.md
            docs/exec-plans/tech-debt-tracker.md
      - name: Publish job summary
        if: always()
        run: |
          {
            echo "## Repo Hygiene"
            echo
            echo "- Guardrails report: reports/guardrails.json"
            echo "- Docs links: ${{ steps.docs_links.outcome }}"
            if [[ -f reports/docs-links.md ]]; then
              echo
              echo "### Docs Links Preview"
              echo
              sed -n '1,40p' reports/docs-links.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail workflow on strict docs link regression
        if: steps.docs_links.outcome == 'failure'
        run: exit 1
